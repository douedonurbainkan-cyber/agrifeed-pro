<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgriFeed Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; }
        .btn-active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- COMPOSANTS DE STRUCTURE ---
        const PageWrap = ({ children, title, onBack, moulin, gc }) => (
            <div className="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-lg">
                <header className="bg-green-700 text-white p-4 sticky top-0 z-10 shadow-md">
                    <div className="flex justify-between items-center">
                        {onBack ? (
                            <button onClick={onBack} className="text-2xl">←</button>
                        ) : <div className="w-8"></div>}
                        <h1 className="text-xl font-bold">AgriFeed Pro</h1>
                        <div className="w-8"></div>
                    </div>
                    {!onBack && (
                        <div className="mt-2 text-xs flex justify-around opacity-90 border-t border-green-600 pt-2">
                            <span>Moulin: <b>{moulin} kg</b></span>
                            <span>Grands Comptes: <b>{gc} kg</b></span>
                        </div>
                    )}
                </header>
                <main className="flex-1 p-4 pb-20">{children}</main>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('accueil');
            const [inventaire, setInventaire] = useState([]);
            const [moulin, setMoulin] = useState(0);
            const [gc, setGc] = useState(0);

            // --- LOGIQUE DE CALCUL DU STOCK ---
            const stockActuel = (id) => {
                const mouvements = inventaire.filter(i => i.matId === id);
                return mouvements.reduce((total, m) => {
                    const q = parseFloat(m.qte) || 0;
                    return m.type === 'entree' ? total + q : total - q;
                }, 0);
            };

            const btnStyle = (bg) => ({
                background: bg,
                color: '#fff',
                border: 'none',
                padding: '25px 10px',
                borderRadius: '18px',
                fontWeight: 'bold',
                fontSize: '16px',
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                gap: '10px',
                boxShadow: '0 4px 6px rgba(0,0,0,0.1)'
            });

            // --- AFFICHAGE DU MENU PRINCIPAL ---
            if (view === "accueil") {
                return (
                    <PageWrap moulin={moulin} gc={gc}>
                        <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px', padding: '10px'}}>
                            <button onClick={() => setView('commandes')} style={btnStyle("#2d6e2d")}>📦 Commandes</button>
                            <button onClick={() => setView('inventaire')} style={btnStyle("#1a4a1a")}>🏠 Inventaire</button>
                            <button onClick={() => setView('mats')} style={btnStyle("#4b5563")}>⚙️ Prix Matières</button>
                            <button onClick={() => setView('devis')} style={btnStyle("#059669")}>📄 Devis Perso</button>
                        </div>
                        <div className="mt-10 p-4 bg-green-50 rounded-xl border border-green-200">
                            <h3 className="text-green-800 font-bold mb-2 text-center">Statut Production</h3>
                            <p className="text-sm text-center text-green-700 italic">Prêt pour les saisies du jour.</p>
                        </div>
                    </PageWrap>
                );
            }

            // --- VUES SECONDAIRES (EXEMPLE) ---
            return (
                <PageWrap title={view} onBack={() => setView('accueil')}>
                    <div className="text-center p-10">
                        <h2 className="text-xl capitalize mb-4">{view}</h2>
                        <p className="text-gray-500">Module en cours de chargement...</p>
                    </div>
                </PageWrap>
            );
        };

        // --- DÉMARRAGE DE L'APPLICATION ---
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
